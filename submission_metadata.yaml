methodology_summary: >
  Our approach builds an offline, CPU-only candidate ranking pipeline for the
  Redrob Senior AI Engineer job description. The system combines precomputed
  semantic similarity, lexical/JD evidence matching, and rule-based scoring
  focused on the role's core requirements: production retrieval and ranking
  systems, embeddings, vector or hybrid search infrastructure, ranking
  evaluation signals such as NDCG/MRR/MAP/A-B testing, Python/code quality,
  seniority fit, product-engineering shipping mindset, and candidate
  availability signals. We also apply conservative penalties for profiles that
  conflict with the JD, including weak production evidence, consulting-only
  backgrounds, framework-only AI demos, wrong-domain specialization, low
  availability, and possible honeypot-style inconsistencies. The final output
  is validated to contain exactly 100 unique candidate IDs, ranks 1-100,
  monotonically non-increasing scores, and concise fact-grounded reasoning for
  manual review.

reproducibility_notes: >
  No hosted LLM APIs, external network calls, or GPU computation are required
  during the ranking step. Any precomputed artifacts used by the ranker should
  be included in the repository or generated through documented preprocessing
  instructions. The README should contain the exact command above so reviewers
  can reproduce team_T1.csv from the released candidates file.
